name: benchmark-ci

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.gitattributes"
      - "**/*.gitignore"
      - "**/*.md"
  workflow_dispatch:

permissions: {}

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_MULTILEVEL_LOOKUP: 0
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: 1
  FORCE_COLOR: 1
  NUGET_XMLDOC_MODE: skip
  TERM: xterm

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0
        with:
          global-json-file: ./global.json

      - name: Run benchmarks
        shell: pwsh
        run: ./build/benchmark.ps1 -PublishResults

      - name: Upload BenchmarkDotNet artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: benchmarks
          path: ./artifacts/benchmarks/**

      - name: Get repository name
        id: repo
        shell: pwsh
        run: |
          $repoName = "${{ github.repository }}".Split("/")[-1]
          echo "name=$repoName" >> $env:GITHUB_OUTPUT

      - name: Publish benchmark results
        uses: martincostello/benchmarkdotnet-results-publisher@b1e7cf14565f479f7d7628c89ca3936142fa6d67  # v2.0.4
        with:
          branch: ${{ github.ref_name }}
          comment-on-threshold: true
          output-file-path: ${{ steps.repo.outputs.name }}/data.json
          repo: hwoodiwiss/benchmarks
          repo-token: ${{ secrets.BENCHMARKS_TOKEN }}
          results-path: ./artifacts/benchmarks/results

      - name: Add step summary
        shell: pwsh
        run: |
          echo "## Benchmark Results" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "Results published to [hwoodiwiss/benchmarks](https://hwoodiwiss.github.io/benchmarks/)." >> $env:GITHUB_STEP_SUMMARY
